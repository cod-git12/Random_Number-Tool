<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ランダムルーレット</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Random Roulette</h2>

        <div class="tabs">
            <div class="tab active" onclick="switchTab(event,'num')">数字</div>
            <div class="tab" onclick="switchTab(event,'text')">文字</div>
        </div>

        <div id="num" class="tabContent active">
            <label>最小</label>
            <input type="number" id="min" placeholder="1">
            <label>最大</label>
            <input type="number" id="max" placeholder="10">
        </div>

        <div id="text" class="tabContent">
            <label>候補 (改行区切り)</label>
            <textarea id="textItems" rows="4" placeholder="Alice&#10;Bob&#10;Charlie&#10;Dave"></textarea>
        </div>

        <label>速度</label>
        <input type="range" id="speed" min="20" max="300" value="80">
        <div class="speedLabel" id="speedLabel">80 ms</div>

        <label>アニメーション</label>
        <select id="animation">
            <option value="roulette">ルーレット</option>
            <option value="spin">円ルーレット</option>
            <option value="slot">スロット</option>
            <option value="flash">フラッシュ</option>
            <option value="shuffle">シャッフル</option>
            <option value="none">なし</option>
        </select>

        <div class="controls">
            <button onclick="generate()">抽選</button>
            <button onclick="openHistory()">履歴</button>
        </div>

        <div class="pointer" id="pointer"></div>
        <div id="wheel"></div>

        <div class="result" id="result">-</div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3>履歴</h3>
            <div class="historyBox">
                <ul id="historyList"></ul>
            </div>

            <h3>分布</h3>
            <canvas id="chart" width="300" height="150"></canvas>

            <div class="modal-buttons">
                <button onclick="downloadHistory()">履歴ダウンロード</button>
                <button onclick="clearHistory()">履歴クリア</button>
                <button onclick="closeHistory()">閉じる</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
